name: Selenium Test Suite

on: [push] # Run every time you push code to GitHub

jobs:
  build:
    runs-on: ubuntu-latest # Uses a Linux machine in the cloud

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Run Selenium Test
      run: |
        # This command runs your JAR file just like Jenkins did
        java -jar form-test.jar